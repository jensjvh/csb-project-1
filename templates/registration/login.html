{% extends "base.html" %}

{% block content %}
<h2>Log In</h2>
<form method="post">
  {% csrf_token %}
    <label>Username</label>
    <input type="text" required placeholder="Your username" name="username" value="{{username}}" class="form-control">
    <label>Password</label>
    <input type="password" required placeholder="Your password" name="password" value="{{password}}" class="form-control">
  {{ form }}
  <button type="submit">Log In</button>
</form>
{% endblock %}
